---
# One-time operational fix: updates EpisodeFiles.DateAdded in Sonarr's SQLite DB
# from the actual file mtime on the NFS share.
#
# Usage:
#   1. Scale down Sonarr (RWO PVC can only be mounted by one pod at a time):
#        flux suspend helmrelease -n media sonarr
#        kubectl scale deployment -n media sonarr --replicas=0
#        kubectl wait --for=delete pod -n media -l app.kubernetes.io/name=sonarr --timeout=60s
#
#   2. Apply and watch (DRY_RUN=true by default — no writes):
#        kubectl apply -f hack/sonarr-fix-dates.yaml
#        kubectl logs -n media job/sonarr-fix-dates -f
#
#   3. To apply changes: delete the job, set DRY_RUN=false below, re-apply:
#        kubectl delete job -n media sonarr-fix-dates
#        kubectl apply -f hack/sonarr-fix-dates.yaml
#        kubectl logs -n media job/sonarr-fix-dates -f
#
#   4. Cleanup and restore Sonarr:
#        kubectl delete -f hack/sonarr-fix-dates.yaml
#        flux resume helmrelease -n media sonarr
apiVersion: v1
kind: ConfigMap
metadata:
  name: sonarr-fix-dates-script
  namespace: media
data:
  fix_dates.py: |
    import sqlite3
    import os
    from datetime import datetime, timezone

    DB_PATH = "/config/sonarr.db"
    DRY_RUN = os.environ.get("DRY_RUN", "true").lower() != "false"

    print(f"Mode: {'DRY RUN (no writes)' if DRY_RUN else 'LIVE (will write to DB)'}")
    print(f"Database: {DB_PATH}\n")

    conn = sqlite3.connect(DB_PATH)
    cursor = conn.cursor()

    import json

    # --- EpisodeFiles.DateAdded + Series.Added ---
    cursor.execute("""
        SELECT ef.Id, s.Id, s.Path, ef.RelativePath, ef.DateAdded, s.Added
        FROM EpisodeFiles ef
        JOIN Series s ON ef.SeriesId = s.Id
    """)

    file_updates = []
    series_min_dates = {}  # series_id -> (min_new_date, current_added)
    missing = []

    for file_id, series_id, series_path, relative_path, file_date, series_added in cursor.fetchall():
        full_path = os.path.join(series_path, relative_path)
        if os.path.exists(full_path):
            mtime = os.path.getmtime(full_path)
            new_date = datetime.fromtimestamp(mtime, tz=timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
            file_updates.append((new_date, file_id))
            # Track oldest episode mtime per series for Series.Added
            if series_id not in series_min_dates or new_date < series_min_dates[series_id][0]:
                series_min_dates[series_id] = (new_date, series_added)
            prefix = "[DRY] " if DRY_RUN else ""
            print(f"  {prefix}{relative_path}")
            print(f"         EpisodeFiles.DateAdded: {file_date} -> {new_date}")
        else:
            missing.append(full_path)
            print(f"  NOT FOUND: {full_path}")

    series_updates = [(min_date, sid) for sid, (min_date, _) in series_min_dates.items()]

    if series_min_dates:
        print(f"\nSeries.Added updates ({len(series_updates)} series):")
        for sid, (min_date, current_added) in series_min_dates.items():
            print(f"  Series {sid}: {current_added} -> {min_date}")

    # --- History.Date for downloadFolderImported (EventType=3) ---
    # Janitorr reads this field to determine episode age, not episodeFile.dateAdded
    cursor.execute("SELECT Id, Date, Data FROM History WHERE EventType = 3")

    history_updates = []
    history_missing = []

    for history_id, current_date, data_json in cursor.fetchall():
        data = json.loads(data_json) if data_json else {}
        imported_path = data.get("importedPath", "")
        if imported_path and os.path.exists(imported_path):
            mtime = os.path.getmtime(imported_path)
            new_date = datetime.fromtimestamp(mtime, tz=timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
            history_updates.append((new_date, history_id))
            prefix = "[DRY] " if DRY_RUN else ""
            print(f"  {prefix}History[{history_id}] {current_date} -> {new_date}  ({imported_path})")
        else:
            history_missing.append(imported_path or f"history_id={history_id}")
            print(f"  NOT FOUND: {imported_path or f'history_id={history_id}'}")

    print(f"\n{'Would update' if DRY_RUN else 'Updating'}:")
    print(f"  {len(file_updates)} EpisodeFiles, {len(series_updates)} Series, {len(history_updates)} History rows")
    print(f"  {len(missing)} episode files not found, {len(history_missing)} history paths not found")

    if not DRY_RUN:
        cursor.executemany("UPDATE EpisodeFiles SET DateAdded = ? WHERE Id = ?", file_updates)
        cursor.executemany("UPDATE Series SET Added = ? WHERE Id = ?", series_updates)
        cursor.executemany("UPDATE History SET Date = ? WHERE Id = ?", history_updates)
        conn.commit()
        print("Done.")
    else:
        print("Set DRY_RUN=false in the Job env to apply changes.")

    conn.close()
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sonarr-fix-dates
  namespace: media
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: fix-dates
          image: python:3.12-slim
          command: ["python", "/scripts/fix_dates.py"]
          env:
            - name: DRY_RUN
              value: "true" # change to "false" to write changes to the DB
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            - name: script
              mountPath: /scripts
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr
        - name: media
          nfs:
            server: truenas.internal
            path: /mnt/torrent/data
        - name: script
          configMap:
            name: sonarr-fix-dates-script
