---
# One-time operational fix: updates MovieFiles.DateAdded in Radarr's SQLite DB
# from the actual file mtime on the NFS share.
#
# Usage:
#   1. Scale down Radarr (RWO PVC can only be mounted by one pod at a time):
#        flux suspend helmrelease -n media radarr
#        kubectl scale deployment -n media radarr --replicas=0
#        kubectl wait --for=delete pod -n media -l app.kubernetes.io/name=radarr --timeout=60s
#
#   2. Apply and watch (DRY_RUN=true by default — no writes):
#        kubectl apply -f hack/radarr-fix-dates.yaml
#        kubectl logs -n media job/radarr-fix-dates -f
#
#   3. To apply changes: delete the job, set DRY_RUN=false below, re-apply:
#        kubectl delete job -n media radarr-fix-dates
#        kubectl apply -f hack/radarr-fix-dates.yaml
#        kubectl logs -n media job/radarr-fix-dates -f
#
#   4. Cleanup and restore Radarr:
#        kubectl delete -f hack/radarr-fix-dates.yaml
#        flux resume helmrelease -n media radarr
apiVersion: v1
kind: ConfigMap
metadata:
  name: radarr-fix-dates-script
  namespace: media
data:
  fix_dates.py: |
    import sqlite3
    import os
    from datetime import datetime, timezone

    DB_PATH = "/config/radarr.db"
    DRY_RUN = os.environ.get("DRY_RUN", "true").lower() != "false"

    print(f"Mode: {'DRY RUN (no writes)' if DRY_RUN else 'LIVE (will write to DB)'}")
    print(f"Database: {DB_PATH}\n")

    conn = sqlite3.connect(DB_PATH)
    cursor = conn.cursor()

    import json

    # --- MovieFiles.DateAdded + Movies.Added ---
    cursor.execute("""
        SELECT mf.Id, m.Id, m.Path, mf.RelativePath, mf.DateAdded, m.Added
        FROM MovieFiles mf
        JOIN Movies m ON mf.Id = m.MovieFileId
    """)

    file_updates = []
    movie_updates = []
    missing = []

    for file_id, movie_id, movie_path, relative_path, file_date, movie_added in cursor.fetchall():
        full_path = os.path.join(movie_path, relative_path)
        if os.path.exists(full_path):
            mtime = os.path.getmtime(full_path)
            new_date = datetime.fromtimestamp(mtime, tz=timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
            file_updates.append((new_date, file_id))
            movie_updates.append((new_date, movie_id))
            prefix = "[DRY] " if DRY_RUN else ""
            print(f"  {prefix}{relative_path}")
            print(f"         MovieFiles.DateAdded: {file_date} -> {new_date}")
            print(f"         Movies.Added:         {movie_added} -> {new_date}")
        else:
            missing.append(full_path)
            print(f"  NOT FOUND: {full_path}")

    # --- History.Date for downloadFolderImported (EventType=3) ---
    # Janitorr reads this field to determine movie age, not movieFile.dateAdded
    cursor.execute("SELECT Id, Date, Data FROM History WHERE EventType = 3")

    history_updates = []
    history_missing = []

    for history_id, current_date, data_json in cursor.fetchall():
        data = json.loads(data_json) if data_json else {}
        imported_path = data.get("importedPath", "")
        if imported_path and os.path.exists(imported_path):
            mtime = os.path.getmtime(imported_path)
            new_date = datetime.fromtimestamp(mtime, tz=timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
            history_updates.append((new_date, history_id))
            prefix = "[DRY] " if DRY_RUN else ""
            print(f"  {prefix}History[{history_id}] {current_date} -> {new_date}  ({imported_path})")
        else:
            history_missing.append(imported_path or f"history_id={history_id}")
            print(f"  NOT FOUND: {imported_path or f'history_id={history_id}'}")

    print(f"\n{'Would update' if DRY_RUN else 'Updating'}:")
    print(f"  {len(file_updates)} MovieFiles, {len(movie_updates)} Movies, {len(history_updates)} History rows")
    print(f"  {len(missing)} movie files not found, {len(history_missing)} history paths not found")

    if not DRY_RUN:
        cursor.executemany("UPDATE MovieFiles SET DateAdded = ? WHERE Id = ?", file_updates)
        cursor.executemany("UPDATE Movies SET Added = ? WHERE Id = ?", movie_updates)
        cursor.executemany("UPDATE History SET Date = ? WHERE Id = ?", history_updates)
        conn.commit()
        print("Done.")
    else:
        print("Set DRY_RUN=false in the Job env to apply changes.")

    conn.close()
---
apiVersion: batch/v1
kind: Job
metadata:
  name: radarr-fix-dates
  namespace: media
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: fix-dates
          image: python:3.12-slim
          command: ["python", "/scripts/fix_dates.py"]
          env:
            - name: DRY_RUN
              value: "true" # change to "false" to write changes to the DB
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            - name: script
              mountPath: /scripts
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr
        - name: media
          nfs:
            server: truenas.internal
            path: /mnt/torrent/data
        - name: script
          configMap:
            name: radarr-fix-dates-script
