---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
resources:
  - ocirepository.yaml
  - helmrelease.yaml
  - bgppeeringpolicy.yaml
  - grafanadashboard.yaml
configMapGenerator:
  - name: cilium-values
    options:
      disableNameSuffixHash: true
    files:
      - values.yaml=./values.yaml
configurations:
  - kustomizeconfig.yaml
