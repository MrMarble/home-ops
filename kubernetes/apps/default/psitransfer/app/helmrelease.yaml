---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app psitransfer
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: psitransfer
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      psitransfer:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/psitrax/psitransfer
              tag: v2.4.4@sha256:312d060e0e2934ff618b3e361d766872b89892dc33c5456858b4aa04dc17a18d
            env:
              TZ: Europe/Madrid
            envFrom:
              - secretRef:
                  name: psitransfer-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 10M
              limits:
                memory: 64M
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: psitransfer
        ports:
          http:
            primary: true
            port: 3000
    route:
      app:
        hostnames:
          - share.atsbhome.xyz
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      data:
        type: nfs
        server: "truenas.internal"
        path: "/mnt/Data/psitransfer"
        globalMounts:
          - path: /data
            readOnly: false
