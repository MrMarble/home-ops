---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dilna
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: dilna-secret
    template:
      engineVersion: v2
      # mergePolicy defaults to Replace: only keys listed here make it into
      # dilna-secret, everything else dataFrom.extract pulls from 1Password
      # is available as a template variable but otherwise gets dropped. So
      # each field the container needs (SSH key, Claude auth) has to be
      # named explicitly, not just added in 1Password.
      data:
        SSH_PRIVATE_KEY: "{{ .SSH_PRIVATE_KEY }}"
        # Either one authenticates the Claude Agent SDK (dilna's
        # ADR-0005/0009) — `default ""` so the template doesn't fail if the
        # 1Password item only has one of the two.
        CLAUDE_CODE_OAUTH_TOKEN: "{{ .CLAUDE_CODE_OAUTH_TOKEN | default \"\" }}"
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY | default \"\" }}"
        GH_TOKEN: "{{ .GH_TOKEN }}"
  dataFrom:
    - extract:
        key: dilna
