---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dilna
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: dilna
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      dilna:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/mrmarble/dilna
              tag: main
              pullPolicy: Always
            env:
              TZ: Europe/Madrid
            envFrom:
              # Claude Agent SDK auth (dilna's ADR-0005/0009, host-passthrough
              # extended to Claude): needs CLAUDE_CODE_OAUTH_TOKEN (from
              # `claude setup-token`) or ANTHROPIC_API_KEY as an env var — the
              # SDK reads it straight from the process environment, no config
              # file. Pulled from the same dilna-secret the ExternalSecret
              # already populates from 1Password.
              - secretRef:
                  name: dilna-secret
            probes:
              liveness: &probes
                enabled: true
                type: HTTP
                path: /api/health
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
              # Claude Code's own sandbox shells out to bubblewrap per Bash
              # command (dilna's ADR-0010). bwrap needs to create a user
              # namespace, which containerd's default seccomp profile blocks
              # outright (containers/bubblewrap#505). bwrap.json is Podman's
              # default profile (containers/common) distributed to every node
              # by the k3s Ansible role — identical to the default except it
              # also allows the specific namespace syscalls bwrap needs, so
              # this stays scoped instead of disabling seccomp for the whole
              # container.
              seccompProfile:
                type: Localhost
                localhostProfile: bwrap.json
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        # Claude Code's bypassPermissions mode (dilna's ADR-0003/0010)
        # refuses to run as root, and dilna's image itself now runs as the
        # non-root `node` user (uid 1000) baked into its node:24 base image.
        # fsGroup replaces the chown dilna's own docker-entrypoint.sh would
        # otherwise do for the Longhorn PVC on a Docker host.
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: dilna-pull-secret
    service:
      app:
        controller: dilna
        ports:
          http:
            primary: true
            port: 3001
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.atsbhome.xyz"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: longhorn
        globalMounts:
          - path: /data
      ssh:
        type: secret
        name: dilna-secret
        defaultMode: 0400
        items:
          - key: SSH_PRIVATE_KEY
            path: id_rsa
        globalMounts:
          # dilna's image no longer runs as root (see securityContext above),
          # so the container's $HOME is /home/node, not /root.
          - path: /home/node/.ssh/id_rsa
            subPath: id_rsa
            readOnly: true
