---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: external-dns
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  values:
    fullnameOverride: *app
    provider: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: &secret external-dns-cloudflare-secret
            key: CF_API_TOKEN
    extraArgs:
      - --cloudflare-proxied
      - --crd-source-kind=DNSEndpoint
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --gateway-name=envoy-external
      - --gateway-namespace=network
    policy: sync
    sources:
      - crd
      - gateway-httproute
    txtPrefix: "k8s."
    txtOwnerId: default
    domainFilters:
      - "atsbhome.xyz"
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
