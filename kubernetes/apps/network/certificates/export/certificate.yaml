---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-dev
spec:
  dnsNames:
    - atsbhome.xyz
    - "*.atsbhome.xyz"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: home-dev-tls
  usages:
    - digital signature
