---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  patches:
    - patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: not-used
        spec:
          install:
            crds: CreateReplace
          upgrade:
            crds: CreateReplace
            cleanupOnFail: true
            remediation:
              remediateLastFailure: true
              retries: 2
      target:
        group: helm.toolkit.fluxcd.io
        kind: HelmRelease
