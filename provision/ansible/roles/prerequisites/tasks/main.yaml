- name: Adjust kernel parameters
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
  loop:
    - { name: "fs.inotify.max_queued_events", value: 16384 }
    - { name: "fs.inotify.max_user_instances", value: 8192 }
    - { name: "fs.inotify.max_user_watches", value: 524288 }
    - { name: "vm.nr_hugepages", value: 2048 }

- name: Configure DNS server
  community.general.nmcli:
    conn_name: "{{ network_interface }}"
    type: ethernet
    dns4:
      - "{{ dns_server }}"
    state: present
  register: nmcli_dns
  tags: dns

- name: Apply DNS configuration
  ansible.builtin.command:
    cmd: nmcli con up "{{ network_interface }}"
  when: nmcli_dns.changed
  changed_when: true
  tags: dns

- name: Disable systemd-resolved stub listener
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: "^#?DNSStubListener="
    line: "DNSStubListener=no"
  register: resolved_conf
  tags: dns

- name: Restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  when: resolved_conf.changed
  tags: dns

- name: Link resolv.conf to systemd-resolved
  ansible.builtin.file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  tags: dns

- name: Install Utilities
  ansible.builtin.dnf:
    name:
      - nfs-utils
